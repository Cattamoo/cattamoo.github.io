---
layout: default
---

<section class="section">
    <div class="container">
        <div class="heading has-text-centered">
            <p class="category is-5">{{ page.categories }}</p>
            <p class="title is-3">{{ page.title }}</p>
            <p class="subtitle is-6"><span class="tag is-white"><small>{{ page.date | date: '%Y.%m.%d'}}</small></span></p>
        </div>
        <hr>
        <br>
        <div class="columns is-multiline">

            <div class="column is-half is-offset-one-quarter">
                <div class="content">
                    {{ content }}
                </div>
            </div>
        </div>
    </div>
</section>
