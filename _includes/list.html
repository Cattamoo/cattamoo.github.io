
<div class="categories">
  {% include categories.html %}
</div>

{% for post in site.posts %}
{% if post.categories[0] == page.type %}
<div class="box">
  <article class="media">
    <div class="media-content">
      <div class="content">
        <a href="{{ post.url | relative_url }}">
          <p class="title is-2">{{ post.title }} <span class="tag is-white is-pulled-right"><small>{{ post.date | date: '%Y.%m.%d'}}</small></span></p>
          <p class="subtitle"><small>{{ post.excerpt | remove: '<p>' | remove: '</p>' }}</small></p>
        </a>
      </div>
    </div>
  </article>
</div>
{% endif %}
{% endfor %}
